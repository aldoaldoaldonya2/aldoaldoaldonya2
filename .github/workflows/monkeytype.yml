name: generate monkeytype readme svg

on:
  schedule:
    - cron: "0 */6 * * *" 
  workflow_dispatch:      

jobs:
  download-svg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Monkeytype Readme SVG
        uses: monkeytype-hub/monkeytype-readme@v1.0.0
        with:
          username: 08horses
          themes: serika_dark
          target-branch: output 
          github-token: ${{ secrets.GITHUB_TOKEN }}
